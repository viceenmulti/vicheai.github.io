<!DOCTYPE html>
<html lang="es">
<head>
    <!-- MÁXIMA COMPATIBILIDAD CON CELULARES: Evita zoom raro y ajusta la pantalla -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Asistente Minimalista con Cuentas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Usa 100dvh para que en celular no se corte con la barra de navegación del navegador */
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            background-color: #1e1e1e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER / BARRA SUPERIOR */
        .header {
            padding: 12px;
            background-color: #252525;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap; /* Permite que los elementos se acomoden abajo si la pantalla es muy angosta */
        }

        .header input {
            flex: 1 1 120px; /* Crece y se achica según el espacio disponible */
            min-width: 0; /* Evita que el input se desborde en pantallas chicas */
            padding: 10px;
            background-color: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .header button {
            padding: 10px 14px;
            background-color: #3a3a3a;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .header button:active {
            background-color: #555;
        }

        /* ÁREA DE CHAT */
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* Scroll suave en celulares */
            -webkit-overflow-scrolling: touch; 
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background-color: #2b3a4a;
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .message.ia {
            align-self: flex-start;
            background-color: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #383838;
            border-bottom-left-radius: 2px;
        }

        .message.error {
            align-self: center;
            background-color: #4a1515;
            color: #ff9999;
            font-size: 13px;
        }

        /* ÁREA DE INGRESO DE TEXTO */
        .input-area {
            padding: 12px;
            background-color: #252525;
            display: flex;
            gap: 8px;
            border-top: 1px solid #333;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            background-color: #1e1e1e;
            border: 1px solid #3a3a3a;
            color: #fff;
            border-radius: 6px;
            outline: none;
            font-size: 15px;
        }

        .input-area button {
            padding: 12px 20px;
            background-color: #3a3a3a;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .input-area button:active {
            background-color: #555;
        }

        /* AJUSTES ESPECÍFICOS PARA CELULARES */
        @media (max-width: 600px) {
            .chat-container {
                border-radius: 0; /* Ocupa toda la pantalla sin bordes redondeados */
            }

            .header {
                padding: 10px;
            }

            .header input {
                font-size: 13px;
                padding: 8px;
            }

            .header button {
                width: 100%; /* El botón 'Cargar Chats' ocupa toda una fila en el cel si no entra */
                margin-top: 2px;
            }

            .message {
                max-width: 90%; /* Un poquito más de ancho en celulares para aprovechar pantalla */
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <input type="text" id="userInputName" placeholder="Usuario (ej: admin)">
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="cargarHistorial()">Cargar Chats</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ia">¡Hola! Ingresá tu usuario y contraseña arriba y tocá "Cargar Chats" para ver tu historial.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)">
        <button onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    const WORKER_BASE = "https://apikey.vgubertimartin.workers.dev";
    let historialLocal = [];

    async function cargarHistorial() {
        const usuario = document.getElementById('userInputName').value.trim();
        const password = document.getElementById('passInput').value.trim() || "betavicheai";

        if (!usuario) {
            alert("Por favor ingresa un nombre de usuario.");
            return;
        }

        try {
            const url = `${WORKER_BASE}/obtener-chats`;
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-User-Name': usuario,
                    'X-User-Pass': password
                }
            });

            if (!response.ok) {
                const errorJson = await response.json().catch(() => ({}));
                throw new Error(errorJson.error || `Error servidor (${response.status})`);
            }

            historialLocal = await response.json();
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';

            if (!Array.isArray(historialLocal) || historialLocal.length === 0) {
                agregarMensaje("No tenés chats guardados aún para este usuario.", 'ia', false);
                historialLocal = [];
            } else {
                historialLocal.forEach(msg => agregarMensaje(msg.texto, msg.tipo, false));
            }
        } catch (err) {
            alert("Error al cargar historial: " + err.message);
        }
    }

    async function guardarHistorial() {
        const usuario = document.getElementById('userInputName').value.trim();
        const password = document.getElementById('passInput').value.trim() || "betavicheai";

        if (!usuario) return;

        try {
            const url = `${WORKER_BASE}/guardar-chat`;
            await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Name': usuario,
                    'X-User-Pass': password
                },
                body: JSON.stringify({ chats: historialLocal })
            });
        } catch (e) {
            console.error("Error guardando en KV:", e);
        }
    }

    async function enviarMensaje() {
        const usuario = document.getElementById('userInputName').value.trim();
        const password = document.getElementById('passInput').value.trim() || "betavicheai";
        const userInput = document.getElementById('userInput');
        const pregunta = userInput.value.trim();

        if (!usuario) {
            alert("Por favor ingresa tu nombre de usuario arriba.");
            return;
        }

        if (!pregunta) return;

        agregarMensaje(pregunta, 'user', true);
        userInput.value = '';

        try {
            const response = await fetch(WORKER_BASE, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Name': usuario,
                    'X-User-Pass': password
                },
                body: JSON.stringify({ pregunta: pregunta })
            });

            const data = await response.json();

            if (response.ok && data.candidates && data.candidates[0].content.parts[0].text) {
                const respuestaIA = data.candidates[0].content.parts[0].text;
                agregarMensaje(respuestaIA, 'ia', true);
                await guardarHistorial();
            } else {
                const errMsj = data.error || "Error en la respuesta del servidor.";
                agregarMensaje("Error: " + errMsj, 'error', false);
            }
        } catch (error) {
            agregarMensaje("Error de conexión: " + error.message, 'error', false);
        }
    }

    function agregarMensaje(texto, tipo, guardarEnMemoria = true) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', tipo);
        msgDiv.textContent = texto;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        if (guardarEnMemoria) {
            historialLocal.push({ texto, tipo });
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            enviarMensaje();
        }
    }
</script>

</body>
</html>
