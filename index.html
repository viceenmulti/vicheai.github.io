<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Minimalista con Cuentas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background-color: #1e1e1e;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .header {
            padding: 12px 15px;
            background-color: #252525;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header input {
            flex: 1;
            padding: 6px 10px;
            background-color: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        .header button {
            padding: 6px 12px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .header button:hover {
            background-color: #555;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 6px;
            line-height: 1.4;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        .message.ia {
            align-self: flex-start;
            background-color: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
        }

        .message.error {
            align-self: center;
            background-color: #4a1515;
            color: #ff9999;
            font-size: 12px;
        }

        .input-area {
            padding: 15px;
            background-color: #252525;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }

        .input-area button {
            padding: 10px 20px;
            background-color: #3a3a3a;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-area button:hover {
            background-color: #4a4a4a;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <input type="text" id="userInputName" placeholder="Tu Nombre de Usuario">
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="cargarHistorial()">Cargar Chats</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ia">¡Hola! Ingresa tu nombre y la contraseña arriba. Podes tocar "Cargar Chats" para ver tu historial.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." onkeypress="handleKeyPress(event)">
        <button onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    const WORKER_URL = "https://apikey.vgubertimartin.workers.dev/";
    let historialLocal = [];

    async function cargarHistorial() {
        const usuario = document.getElementById('userInputName').value.trim();
        const password = document.getElementById('passInput').value.trim();

        if (!usuario || !password) {
            alert("Por favor ingresa usuario y contraseña.");
            return;
        }

        try {
            const response = await fetch(`${WORKER_URL}obtener-chats`, {
                headers: {
                    'X-User-Name': usuario,
                    'X-User-Pass': password
                }
            });

            if (!response.ok) throw new Error("Acceso denegado.");

            historialLocal = await response.json();
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = ''; // Limpiar pantalla

            if (historialLocal.length === 0) {
                agregarMensaje("No tenes historial guardado aún.", 'ia');
            } else {
                historialLocal.forEach(msg => agregarMensaje(msg.texto, msg.tipo, false));
            }
        } catch (err) {
            alert("Error al cargar historial: " + err.message);
        }
    }

    async function guardarHistorial() {
        const usuario = document.getElementById('userInputName').value.trim();
        const password = document.getElementById('passInput').value.trim();

        if (!usuario || !password) return;

        await fetch(`${WORKER_URL}guardar-chat`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-User-Name': usuario,
                'X-User-Pass': password
            },
            body: JSON.stringify({ chats: historialLocal })
        });
    }

    async function enviarMensaje() {
        const usuario = document.getElementById('userInputName').value.trim();
        const password = document.getElementById('passInput').value.trim();
        const userInput = document.getElementById('userInput');
        const pregunta = userInput.value.trim();

        if (!usuario || !password) {
            alert("Por favor ingresa usuario y contraseña.");
            return;
        }

        if (!pregunta) return;

        agregarMensaje(pregunta, 'user');
        userInput.value = '';

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Name': usuario,
                    'X-User-Pass': password
                },
                body: JSON.stringify({ pregunta: pregunta })
            });

            const data = await response.json();

            if (response.ok && data.candidates && data.candidates[0].content.parts[0].text) {
                const respuestaIA = data.candidates[0].content.parts[0].text;
                agregarMensaje(respuestaIA, 'ia');
                await guardarHistorial(); // Guarda en Cloudflare KV automáticamente
            } else {
                agregarMensaje("Error en la respuesta: " + (data.error || "Error desconocido"), 'error');
            }
        } catch (error) {
            agregarMensaje("Error de conexión: " + error.message, 'error');
        }
    }

    function agregarMensaje(texto, tipo, guardarEnMemoria = true) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', tipo);
        msgDiv.textContent = texto;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        if (guardarEnMemoria) {
            historialLocal.push({ texto, tipo });
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            enviarMensaje();
        }
    }
</script>

</body>
</html>
