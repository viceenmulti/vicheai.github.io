<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Minimalista</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 650px;
            height: 90vh;
            background-color: #1e1e1e;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .header {
            padding: 15px;
            background-color: #252525;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header label {
            font-size: 13px;
            color: #aaa;
        }

        .header input {
            flex: 1;
            padding: 6px 10px;
            background-color: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 6px;
            line-height: 1.4;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        .message.ia {
            align-self: flex-start;
            background-color: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
        }

        .message.error {
            align-self: center;
            background-color: #4a1515;
            color: #ff9999;
            font-size: 12px;
        }

        .input-area {
            padding: 15px;
            background-color: #252525;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }

        .input-area button {
            padding: 10px 20px;
            background-color: #3a3a3a;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-area button:hover {
            background-color: #4a4a4a;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <label for="apiKey">API Key:</label>
        <input type="password" id="apiKey" placeholder="Pega tu API Key de Gemini aquí">
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ia">¡Hola! Pega tu API Key arriba para empezar a consultar.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu consulta..." onkeypress="handleKeyPress(event)">
        <button onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    async function enviarMensaje() {
        const apiKeyInput = document.getElementById('apiKey');
        const userInput = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');

        const apiKey = apiKeyInput.value.trim();
        const pregunta = userInput.value.trim();

        if (!apiKey) {
            alert("Por favor ingresa tu API Key primero.");
            return;
        }

        if (!pregunta) return;

        // Mostrar mensaje del usuario
        agregarMensaje(pregunta, 'user');
        userInput.value = '';

        // Petición a Gemini
        const modelo = "gemini-3.1-flash-lite";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${apiKey}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    // Instrucción obligatoria del sistema para fijar el idioma
                    system_instruction: {
                        parts: [{ text: "Responde ÚNICAMENTE en español. Bajo ninguna circunstancia respondas en otro idioma." }]
                    },
                    contents: [{ parts: [{ text: pregunta }] }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const respuestaIA = data.candidates[0].content.parts[0].text;
                agregarMensaje(respuestaIA, 'ia');
            } else {
                agregarMensaje("Error en la respuesta de la API.", 'error');
            }
        } catch (error) {
            agregarMensaje("Error al conectar con la API: " + error.message, 'error');
        }
    }

    function agregarMensaje(texto, tipo) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', tipo);
        msgDiv.textContent = texto;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            enviarMensaje();
        }
    }
</script>

</body>
</html>
